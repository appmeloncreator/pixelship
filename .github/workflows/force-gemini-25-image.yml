name: Force Gemini 2.5 image model
on:
  push:
    paths:
      - .github/workflows/force-gemini-25-image.yml
jobs:
  patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: |
          node - <<'NODE'
          const fs=require('fs');
          let s=fs.readFileSync('pipeline.js','utf8');
          s=s.replace("IMAGE_MODEL=process.env.GEMINI_IMAGE_MODEL||'gemini-3.1-flash-image'", "IMAGE_MODEL='gemini-2.5-flash-image'");
          fs.writeFileSync('pipeline.js',s);
          let env=fs.readFileSync('config.env.example','utf8');
          env=env.replace(/^GEMINI_IMAGE_MODEL=.*\n?/gm,'');
          fs.writeFileSync('config.env.example',env);
          NODE
      - run: node --check pipeline.js
      - run: rm .github/workflows/force-gemini-25-image.yml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pipeline.js config.env.example .github/workflows/force-gemini-25-image.yml
          git commit -m "Force Gemini 2.5 Flash Image rendering"
          git push
