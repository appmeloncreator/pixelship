name: Final prompt after blueprint
on:
  push:
    paths:
      - .github/workflows/final-prompt-after-blueprint.yml
jobs:
  patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: |
          node - <<'NODE'
          const fs=require('fs');
          const p='pipeline.js';
          let s=fs.readFileSync(p,'utf8');
          if (!s.includes('async function buildFinalRendererPrompt')) {
            const marker='async function rankFailedCandidates(prompt,candidates)';
            const fn="async function buildFinalRendererPrompt({originalPrompt,enhanced,kontextPrompt,blueprint,decoded,isEdit,hasReference}){const system='You write the final prompt for the Kontext image model after a Pixelship blueprint has already been produced. IMAGE 1 is the expanded blueprint preview. Use the older enhanced prompt, the Kontext-safe prompt, the blueprint text, and the preview image to create ONE complete render prompt. Preserve the blueprint layout, subject, palette, silhouette, pose, composition, and any TEXT exactly. Require a complete intentional background. Forbid gibberish, pseudo-text, watermarks, signatures, and unrequested writing. If references are supplied later in a collage, tell Kontext to preserve their visible object identity and physical design. NEVER output brand, company, trademark, product-line, or model names as object identity; describe only visible geometry and details, except literal requested visible text may stay inside double quotation marks. Return only the final prompt.';const prompt='Original user request: '+originalPrompt+'\\nOlder enhanced prompt: '+enhanced+'\\nKontext-safe prompt before blueprint: '+kontextPrompt+'\\nBlueprint text:\\n'+blueprint+'\\nExpanded blueprint size: '+decoded.outputWidth+'x'+decoded.outputHeight+'\\nMode: '+(isEdit||hasReference?'reference-guided / collage input':'blueprint-only input')+'\\nWrite the final renderer prompt now.';return(await run(PLAN_MODEL,{prompt,system_prompt:system,image_input:[decoded.dataUrl]})).trim()}";
            if (!s.includes(marker)) throw new Error('rank marker missing');
            s=s.replace(marker,fn+marker);
          }
          const oldSeq="blueprint=await validateBlueprint(prompt,enhanced,contexts,webReference,dimensions),decoded=decodeBlueprint(blueprint),hasWebReference=!!webReference,usesReferencePath=isEdit||hasWebReference,collage=";
          const newSeq="blueprint=await validateBlueprint(prompt,enhanced,contexts,webReference,dimensions),decoded=decodeBlueprint(blueprint),hasWebReference=!!webReference,finalPrompt=await buildFinalRendererPrompt({originalPrompt:prompt,enhanced,kontextPrompt,blueprint,decoded,isEdit,hasReference:isEdit||hasWebReference}),usesReferencePath=isEdit||hasWebReference,collage=";
          if (!s.includes(newSeq)) {
            if (!s.includes(oldSeq)) throw new Error('generate sequence missing');
            s=s.replace(oldSeq,newSeq);
          }
          s=s.replaceAll("composition: '+kontextPrompt+'", "composition: '+finalPrompt+'");
          s=s.replaceAll("instruction: '+kontextPrompt+'", "instruction: '+finalPrompt+'");
          s=s.replace("Generation prompt: '+kontextPrompt+(isEdit?' Preserve recognizable unchanged regions and apply only the requested edit.':'')", "Generation prompt: '+finalPrompt+(isEdit?' Preserve recognizable unchanged regions and apply only the requested edit.':'')");
          fs.writeFileSync(p,s);
          NODE
      - run: node --check pipeline.js
      - run: rm .github/workflows/final-prompt-after-blueprint.yml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pipeline.js .github/workflows/final-prompt-after-blueprint.yml
          git commit -m "Build final render prompt after blueprint"
          git push
