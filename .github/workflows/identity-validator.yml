name: Tune identity validator
on:
  push:
    paths:
      - .github/workflows/identity-validator.yml
jobs:
  patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: |
          node - <<'NODE'
          const fs=require('fs');
          let s=fs.readFileSync('pipeline.js','utf8');
          const old="const QUALITY='You are Pixelship image quality control. IMAGE 1 is the candidate render. Any later images are source-of-truth visual references. Judge whether the image is GOOD, usable, and clearly captures the request plus the blueprint philosophy: core subject, mood, composition, readable silhouette, palette direction, and intended scene. Do not demand 100% pixel/detail perfection, but do demand a strong result. Score 1 to 10. PASS requires score 7+ and no hard failure. Hard failures: wrong or unclear main subject, unrelated image, missing important requested element, weak/ugly composition, muddy unreadable subject, severe reference identity mismatch, requested text absent/unreadable/misspelled, prominent gibberish or pseudo-text, blank/accidental background, extreme crop, distorted anatomy/geometry that makes the result look bad, or overall low-quality/unfinished appearance. Allowed: small detail differences, reasonable stylization, minor proportion shifts, tiny artifacts, or slightly different interpretation IF the image still looks intentional, polished, and immediately recognizable. A merely acceptable but ugly/confusing image should score 4-6 and FAIL. A good image that represents the blueprint philosophy should score 7-10 and PASS. If visible text was not requested, reject prominent accidental writing but ignore tiny marks. Reply exactly (img:PASS score:N correction:) or (img:FALSE score:N correction:BRIEF_SPECIFIC_REASON).'";
          const newer="const QUALITY='You are Pixelship image quality control. IMAGE 1 is the candidate render. Any later images are source-of-truth visual references. Judge whether the image is GOOD, usable, and clearly captures the request plus the blueprint philosophy: core subject, mood, readable silhouette, palette direction, and intended scene. Do not demand exact object placement, exact pose, or exact composition unless the user explicitly requested that layout or the reference identity depends on it. The model may move elements around if the result still communicates the idea. But defining features of named/reference objects must be correct: distinctive shape, camera/button/control layout, logos/text when requested, proportions, and other identity-critical details. Example: a phone can be placed differently, but if the requested/reference phone has a specific camera arrangement, wrong cameras are a hard failure. Score 1 to 10. PASS requires score 7+ and no hard failure. Hard failures: wrong or unclear main subject, unrelated image, missing important requested element, identity-critical details wrong, severe reference mismatch, requested text absent/unreadable/misspelled, prominent gibberish or pseudo-text, blank/accidental background, extreme crop, distorted anatomy/geometry that makes the result look bad, or overall low-quality/unfinished appearance. Allowed: non-critical placement changes, reasonable stylization, minor proportion shifts, tiny artifacts, small missing non-defining details, or slightly different composition IF the image still looks intentional, polished, and immediately recognizable. A merely acceptable but ugly/confusing image should score 4-6 and FAIL. A good image that represents the blueprint philosophy while preserving identity-critical features should score 7-10 and PASS. If visible text was not requested, reject prominent accidental writing but ignore tiny marks. Reply exactly (img:PASS score:N correction:) or (img:FALSE score:N correction:BRIEF_SPECIFIC_REASON).'";
          if(!s.includes(newer)){
            if(!s.includes(old)) throw new Error('validator target not found');
            s=s.replace(old,newer);
          }
          s=s.replace('Judge for whether the image is good and represents the blueprint philosophy; do not require perfection, but reject bad/ugly/confusing results. Return the exact required one-line verdict.','Judge whether the image is good, represents the blueprint philosophy, and preserves identity-critical details. Do not require exact placement unless prompted. Return the exact required one-line verdict.');
          fs.writeFileSync('pipeline.js',s);
          NODE
      - run: node --check pipeline.js
      - run: rm .github/workflows/identity-validator.yml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pipeline.js .github/workflows/identity-validator.yml
          git commit -m "Require identity-critical details in validator"
          git push
