name: Balance validator strictness
on:
  push:
    paths:
      - .github/workflows/balance-validator.yml
jobs:
  patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: |
          node - <<'NODE'
          const fs=require('fs');
          let s=fs.readFileSync('pipeline.js','utf8');
          const old="const QUALITY='You are Pixelship image quality control. IMAGE 1 is the candidate render. Any later images are source-of-truth visual references. Judge whether the image captures the request and the blueprint philosophy: the core subject, mood, composition, readable silhouette, palette direction, and intended scene. It does NOT need to be 100% perfect or match every pixel/detail. Score 1 to 10. PASS requires score 6+ and no hard failure. Hard failures only: clearly wrong subject, completely unrelated image, missing the main requested object/person, severe reference identity mismatch, requested text is absent or unreadable, obvious gibberish/pseudo-text, blank/accidental background, extreme crop hiding the subject, or broken anatomy/geometry that ruins the image. Minor deviations, stylization differences, imperfect proportions, small missing details, mild composition changes, tiny artifacts, or a different but reasonable interpretation should PASS if the image still represents the intended idea. A usable image that communicates the blueprint philosophy should score 6-8 and PASS. Only fail images that are genuinely bad, misleading, or unusable. If visible text was not requested, ignore tiny accidental markings unless they look like prominent gibberish. Reply exactly (img:PASS score:N correction:) or (img:FALSE score:N correction:BRIEF_SPECIFIC_REASON).'";
          const newer="const QUALITY='You are Pixelship image quality control. IMAGE 1 is the candidate render. Any later images are source-of-truth visual references. Judge whether the image is GOOD, usable, and clearly captures the request plus the blueprint philosophy: core subject, mood, composition, readable silhouette, palette direction, and intended scene. Do not demand 100% pixel/detail perfection, but do demand a strong result. Score 1 to 10. PASS requires score 7+ and no hard failure. Hard failures: wrong or unclear main subject, unrelated image, missing important requested element, weak/ugly composition, muddy unreadable subject, severe reference identity mismatch, requested text absent/unreadable/misspelled, prominent gibberish or pseudo-text, blank/accidental background, extreme crop, distorted anatomy/geometry that makes the result look bad, or overall low-quality/unfinished appearance. Allowed: small detail differences, reasonable stylization, minor proportion shifts, tiny artifacts, or slightly different interpretation IF the image still looks intentional, polished, and immediately recognizable. A merely acceptable but ugly/confusing image should score 4-6 and FAIL. A good image that represents the blueprint philosophy should score 7-10 and PASS. If visible text was not requested, reject prominent accidental writing but ignore tiny marks. Reply exactly (img:PASS score:N correction:) or (img:FALSE score:N correction:BRIEF_SPECIFIC_REASON).'";
          if(!s.includes(newer)){
            if(!s.includes(old)) throw new Error('validator target not found');
            s=s.replace(old,newer);
          }
          s=s.replace('pass=valid&&verdictPass&&score>=6','pass=valid&&verdictPass&&score>=7');
          s=s.replace('Judge generously for whether the image represents the blueprint philosophy and return the exact required one-line verdict.','Judge for whether the image is good and represents the blueprint philosophy; do not require perfection, but reject bad/ugly/confusing results. Return the exact required one-line verdict.');
          fs.writeFileSync('pipeline.js',s);
          NODE
      - run: node --check pipeline.js
      - run: rm .github/workflows/balance-validator.yml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pipeline.js .github/workflows/balance-validator.yml
          git commit -m "Balance validator strictness"
          git push
