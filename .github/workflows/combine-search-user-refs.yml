name: Combine search and user references
on:
  push:
    paths: [.github/workflows/combine-search-user-refs.yml]
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          node <<'NODE'
          const fs=require('fs');let t=fs.readFileSync('pipeline.js','utf8');
          t=t.replace("webReference=!isEdit&&options.allowWebSearch===true?await selectWebReference(prompt,!!options.forceWebSearch):null","webReference=options.allowWebSearch===true?await selectWebReference(prompt,!!options.forceWebSearch):null");
          const old="collage=usesReferencePath?await createReferenceCollage([...(isEdit?contexts:[{url:webReference.image,originalPrompt:'Internet visual reference for '+webReference.query}]),{url:decoded.dataUrl}]):null";
          const next="collage=usesReferencePath?await createReferenceCollage([...contexts,...(hasWebReference?[{url:webReference.image,originalPrompt:'Internet visual reference for '+webReference.query}]:[]),{url:decoded.dataUrl}]):null";
          if(!t.includes(old))throw new Error('Collage source block missing');t=t.replace(old,next);
          t=t.replace("quality=await judge(judgePrompt,url,isEdit?contexts.map(context=>context.url):webReference?[webReference.image]:[])","quality=await judge(judgePrompt,url,[...contexts.map(context=>context.url),...(webReference?[webReference.image]:[])])");
          fs.writeFileSync('pipeline.js',t);
          NODE
      - run: |
          rm .github/workflows/combine-search-user-refs.yml
          git config user.name "Pixelship Automation"
          git config user.email "actions@users.noreply.github.com"
          git add pipeline.js .github/workflows/combine-search-user-refs.yml
          git commit -m "Combine uploaded and searched references"
          git push
