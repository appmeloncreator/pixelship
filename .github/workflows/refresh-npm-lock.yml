name: Refresh npm lockfile
on:
  push:
    paths:
      - .github/workflows/refresh-npm-lock.yml
jobs:
  refresh-lockfile:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --package-lock-only
      - run: rm .github/workflows/refresh-npm-lock.yml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json .github/workflows/refresh-npm-lock.yml
          git commit -m "Update npm lockfile for setup script"
          git push
