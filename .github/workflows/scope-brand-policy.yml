name: Scope brand removal to Kontext
on:
  push:
    paths: [.github/workflows/scope-brand-policy.yml]
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          node <<'NODE'
          const fs=require('fs');let t=fs.readFileSync('pipeline.js','utf8');
          t=t.replace('Never output or repeat any brand, company, product-line, trademark, or model name in a tool prompt, even when the user supplied it. Replace every such name with a precise description of visible geometry, proportions, materials, controls, colors, markings, and construction details.','Preserve any brand, company, product-line, trademark, or model name exactly when the user supplied it so visual-reference search can identify the correct subject. Never invent a name the user did not provide.');
          t=t.replace('Never output or repeat any brand, company, product-line, trademark, or model name, even when the user supplied it. Replace each name with precise visible geometry, proportions, materials, controls, colors, markings, and construction details.','Preserve any brand, company, product-line, trademark, or model name exactly when the user supplied it so search and planning identify the correct subject. Never invent a name the user did not provide.');
          const old="enhanced=await run(CHAT_MODEL,{prompt:(isEdit?'Multi-reference edit instructions: ':'User description: ')+prompt+'\\nEnhanced prompt:',system_prompt:ENHANCER}),blueprint=await validateBlueprint";
          const next="enhanced=await run(CHAT_MODEL,{prompt:(isEdit?'Multi-reference edit instructions: ':'User description: ')+prompt+'\\nEnhanced prompt:',system_prompt:ENHANCER}),kontextPrompt=await run(CHAT_MODEL,{prompt:'Internal planning prompt: '+enhanced+(webReference?'\\nVerified visual reference details: '+webReference.visualDescription:'')+'\\nRewrite for Kontext:',system_prompt:'Return only a complete image-generation prompt. Remove every brand, company, trademark, product-line, and model name. Replace each removed name with concrete visible geometry, proportions, materials, controls, colors, markings, and construction details. Preserve the requested scene, pose, composition, text, and background. Do not mention that names were removed.'}),blueprint=await validateBlueprint";
          if(!t.includes(old))throw new Error('Insertion point missing');t=t.replace(old,next);
          t=t.replace("Follow this requested scene and composition: '+enhanced+","Follow this requested scene and composition: '+kontextPrompt+");
          t=t.replace("according to this instruction: '+enhanced+","according to this instruction: '+kontextPrompt+");
          t=t.replace("Generation prompt: '+enhanced+","Generation prompt: '+kontextPrompt+");
          fs.writeFileSync('pipeline.js',t);
          NODE
      - run: |
          rm .github/workflows/scope-brand-policy.yml
          git config user.name "Pixelship Automation"
          git config user.email "actions@users.noreply.github.com"
          git add pipeline.js .github/workflows/scope-brand-policy.yml
          git commit -m "Scope brand removal to Kontext only"
          git push
