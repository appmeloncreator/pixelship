name: Strict retry prompt refinement
on:
  push:
    paths:
      - .github/workflows/strict-retry-refine.yml
jobs:
  patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: |
          node - <<'NODE'
          const fs=require('fs');
          const p='pipeline.js';
          let s=fs.readFileSync(p,'utf8');
          const oldFn="async function reviseRendererPrompt({originalPrompt,currentPrompt,correction,failedImage,isEdit,referenceImages=[]}){const refs=(referenceImages||[]).filter(Boolean).slice(0,8),system='You rewrite image-generation prompts after a failed render. IMAGE 1 is the failed render; later images are source-of-truth references. Return only one complete replacement renderer prompt. Preserve every correct requirement from the original request and current prompt, explicitly fix the quality correction, forbid gibberish or unrequested text, require a complete background, and preserve each reference object identity and physical design. Never drift toward an older or generic version. NEVER output or repeat brand, company, trademark, product-line, or model names; describe only visible geometry and physical details. Do not explain.';const prompt='Original user request: '+originalPrompt+'\\nMode: '+(isEdit?'reference-guided image generation/edit':'fresh generation')+'\\nCurrent renderer prompt: '+currentPrompt+'\\nQuality failure: '+correction+'\\nRewrite the complete prompt so the next render fixes the failure without discarding correct reference-specific details.';return(await run(PLAN_MODEL,{prompt,system_prompt:system,image_input:[failedImage,...refs]})).trim()}";
          const newFn="async function reviseRendererPrompt({originalPrompt,currentPrompt,correction,failedImage,isEdit,referenceImages=[]}){const refs=(referenceImages||[]).filter(Boolean).slice(0,8),system='You are a strict prompt repair tool for Pixelship retries. IMAGE 1 is the failed render; later images are source-of-truth references. Return only ONE complete replacement renderer prompt. Do not brainstorm, do not change the subject, do not add new objects, do not change the camera angle unless the correction explicitly requires it, and do not discard any correct requirement. Preserve the original request, blueprint intent, composition, background requirement, requested text, reference identity, colors, geometry, and physical design. Fix ONLY the listed quality failure. Forbid gibberish, pseudo-text, watermarks, signatures, and unrequested writing. NEVER output brand, company, trademark, product-line, or model names as object identity; describe only visible geometry and details, except exact requested visible text may remain inside double quotation marks. Do not explain.';const prompt='Original user request: '+originalPrompt+'\\nMode: '+(isEdit?'reference-guided image generation/edit':'fresh generation')+'\\nCurrent renderer prompt to preserve unless contradicted by the failure: '+currentPrompt+'\\nQuality failure to fix, and only this: '+correction+'\\nWrite the next retry prompt. It must be a conservative repair of the current prompt, not a new concept.';return(await run(PLAN_MODEL,{prompt,system_prompt:system,image_input:[failedImage,...refs]})).trim()}";
          if(!s.includes(newFn)){
            if(!s.includes(oldFn)) throw new Error('revise function target not found');
            s=s.replace(oldFn,newFn);
          }
          const oldLoop="selected=url;if(quality.pass)break;if(attempt+1>=MAX_RENDER_ATTEMPTS)break}";
          const newLoop="selected=url;if(quality.pass)break;if(attempt+1>=MAX_RENDER_ATTEMPTS)break;attemptPrompt=await reviseRendererPrompt({originalPrompt:judgePrompt,currentPrompt:attemptPrompt,correction:quality.correction,failedImage:url,isEdit:usesReferencePath,referenceImages:[...contexts.map(context=>context.url),...(webReference?[webReference.image]:[])]})}";
          if(!s.includes(newLoop)){
            if(!s.includes(oldLoop)) throw new Error('retry loop target not found');
            s=s.replace(oldLoop,newLoop);
          }
          fs.writeFileSync(p,s);
          NODE
      - run: node --check pipeline.js
      - run: rm .github/workflows/strict-retry-refine.yml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pipeline.js .github/workflows/strict-retry-refine.yml
          git commit -m "Restore strict retry prompt refinement"
          git push
