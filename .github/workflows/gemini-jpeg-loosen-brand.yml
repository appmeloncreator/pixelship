name: Gemini JPEG and brand prompt update
on:
  push:
    paths:
      - .github/workflows/gemini-jpeg-loosen-brand.yml
jobs:
  patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: |
          node - <<'NODE'
          const fs=require('fs');
          let s=fs.readFileSync('pipeline.js','utf8');
          s=s.replace(/mime_type:'image\/png'/g,"mime_type:'image/jpeg'");
          s=s.replace("image.mime_type||image.mimeType||'image/png'", "image.mime_type||image.mimeType||'image/jpeg'");
          s=s.replace("Never introduce a brand, company, product-line, or model name that the user did not explicitly mention. If the user explicitly mentioned one, preserve the exact name only inside double quotation marks.","Never invent a brand, company, product-line, or model name that the user did not explicitly mention. If the user explicitly mentioned one, you may preserve it when it is needed for accuracy.");
          s=s.replace("NEVER output brand, company, trademark, product-line, or model names as object identity; describe only visible geometry and details, except exact requested visible text may remain inside double quotation marks.","Do not invent brand, company, trademark, product-line, or model names. User-mentioned names may be kept when needed for accuracy; otherwise describe visible geometry and details. Exact requested visible text may remain inside double quotation marks.");
          s=s.replace("NEVER output brand, company, trademark, product-line, or model names as object identity; describe only visible geometry and details, except literal requested visible text may stay inside double quotation marks.","Do not invent brand, company, trademark, product-line, or model names. User-mentioned names may be kept when needed for accuracy; otherwise describe visible geometry and details. Literal requested visible text may stay inside double quotation marks.");
          s=s.replace("Do not include brand, company, product-line, trademark, or model names as the identity of an object. Replace a named object with the exact object shown in the supplied reference image and preserve the requested scene and composition. Exception: when the user explicitly wants visible lettering, a logo word, screen text, label, or brand text to appear inside the image, keep only that exact visible text inside double quotation marks. Never state the product name merely to identify the object.","Do not invent brand, company, product-line, trademark, or model names. If the user explicitly mentioned one, you may keep it when it helps preserve the intended subject/reference. When visible lettering, a logo word, screen text, label, or brand text is requested, keep that exact visible text inside double quotation marks.");
          s=s.replace("Never invent brand names. If the user explicitly mentions a brand, product, or model name, keep its exact name only inside double quotation marks in the tool prompt.","Never invent brand names. If the user explicitly mentions a brand, product, or model name, preserve it when it helps identify the intended subject.");
          fs.writeFileSync('pipeline.js',s);
          NODE
      - run: node --check pipeline.js
      - run: rm .github/workflows/gemini-jpeg-loosen-brand.yml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pipeline.js .github/workflows/gemini-jpeg-loosen-brand.yml
          git commit -m "Use JPEG Gemini output and loosen brand prompts"
          git push
